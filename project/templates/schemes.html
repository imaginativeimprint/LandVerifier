    // PERFECTED MULTILINGUAL HIGH-RELIABILITY SORTING CALCULATOR
    function applyFilters() {
      let filtered = [...schemesDB];
      const search = document.getElementById('searchInput').value.toLowerCase();
      const district = document.getElementById('districtFilter').value;
      const cropVal = document.getElementById('cropFilter').value;

      if(search) {
        filtered = filtered.filter(s => 
          t(s,"name").toLowerCase().includes(search) || 
          t(s,"desc").toLowerCase().includes(search) ||
          s.ministry.toLowerCase().includes(search)
        );
      }
      if(district !== "all") {
        filtered = filtered.filter(s => 
          s.district.split(',').includes(district) || 
          (district === "Karnataka" && s.state === "Karnataka") || 
          (district === "All India" && s.state === "All India")
        );
      }
      if(cropVal !== "all") {
        filtered = filtered.filter(s => t(s,"crop").toLowerCase().includes(cropVal.toLowerCase()));
      }

      // Sorting Algorithm
      const sortType = document.getElementById('sortSelect').value;
      if(sortType === "deadline_asc") {
        filtered.sort((a, b) => {
          const dateA = (a.deadline && /^\d{4}-\d{2}-\d{2}$/.test(a.deadline)) ? new Date(a.deadline).getTime() : Infinity;
          const dateB = (b.deadline && /^\d{4}-\d{2}-\d{2}$/.test(b.deadline)) ? new Date(b.deadline).getTime() : Infinity;
          return dateA - dateB; // Pushes missing or indefinite dates to the absolute bottom safely
        });
      } else if(sortType === "name") {
        filtered.sort((a, b) => t(a, "name").localeCompare(t(b, "name"), currentLang));
      }

      renderCards(filtered);
    }

      let optAll = document.createElement('option');
      optAll.value = "all";
      optAll.id = "optAllCrops";
      if(currentLang === "en") optAll.innerText = "All Crops";
      else if(currentLang === "hi") optAll.innerText = "सभी फसलें";
      else optAll.innerText = "ಎಲ್ಲಾ ಬೆಳೆಗಳು";
      cropSelect.appendChild(optAll);

      const cropSet = new Set();
      schemesDB.forEach(s => { 
        let c = t(s, "crop"); 
        c.split(',').forEach(cr => { if(cr.trim() && cr.trim() !== "NA") cropSet.add(cr.trim()); }); 
      });
      
      cropSet.forEach(c => { 
        let opt = document.createElement('option'); 
        opt.value = c; 
        opt.innerText = c; 
        cropSelect.appendChild(opt); 
      });

      // Restore active selection if present in new set
      if(Array.from(cropSet).includes(currentValue)) {
        cropSelect.value = currentValue;
      }
    }
