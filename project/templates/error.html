<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - LandVerify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #dc3545;
        }
        .error-message {
            font-size: 1.2rem;
            color: #6c757d;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <div class="error-code">{{ error_code }}</div>
            <h2>Oops! Something went wrong</h2>
            <p class="error-message">{{ message }}</p>
            <a href="/" class="btn btn-success">Go Back Home</a>
        </div>
    </div>
</body>
</html>
