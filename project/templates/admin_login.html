<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LandVerify Security Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #141b15 0%, #1c2e21 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 45px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .admin-icon {
            width: 70px;
            height: 70px;
            background: #eaf5ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: #2d5a3b;
        }
        .btn-login {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            color: white;
        }
        .error-alert {
            background: #fce8e6;
            color: #c5221f;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid #c5221f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card text-center">
            <div class="admin-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h3 class="fw-bold text-dark mb-1">Registry Authority Login</h3>
            <p class="text-muted small mb-4">LandVerify Spatial Audit Administration Portal</p>
            
            {% if error %}
            <div class="error-alert text-start">
                <i class="fas fa-exclamation-triangle me-2"></i> {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/admin/login">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold text-secondary">Administrative ID</label>
                    <input type="text" name="username" class="form-control form-control-lg" style="border-radius: 10px;" required placeholder="Enter admin username">
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold text-secondary">Secure Gateway Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" style="border-radius: 10px;" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-login shadow-sm">
                    <i class="fas fa-sign-in-alt me-2"></i> Authenticate Session
                </button>
            </form>
            
            <div class="mt-4">
                <a href="/" class="text-decoration-none text-success small"><i class="fas fa-arrow-left me-1"></i> Return to Gateway</a>
            </div>
        </div>
    </div>
</body>
</html>
